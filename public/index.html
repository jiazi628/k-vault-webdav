<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Vault WebDAV</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fa; --surface: #ffffff; --surface2: #f0f2f5; --border: #d9dce3;
  --text: #1a1d27; --text2: #6b7280; --primary: #6c5ce7; --primary-hover: #5a4bd6;
  --danger: #e74c3c; --success: #2ecc71; --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }

/* Login */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); }
.login-box h1 { font-size: 26px; margin-bottom: 8px; text-align: center; }
.login-box p { color: var(--text2); margin-bottom: 28px; font-size: 14px; text-align: center; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.form-group input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,.12); }
.btn { padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s; background: var(--surface); color: var(--text); }
.btn:hover { box-shadow: var(--shadow); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); width: 100%; }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-sm { padding: 7px 16px; font-size: 13px; }
.btn-ghost { background: var(--surface); color: var(--text); }
.btn-ghost:hover { border-color: var(--text2); background: var(--surface2); }
.btn-danger { background: var(--surface); color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-success { background: var(--surface); color: var(--success); border-color: var(--success); }
.btn-success:hover { background: var(--success); color: #fff; }

/* App */
#app { display: none; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
header h1 { font-size: 18px; flex-shrink: 0; }
.breadcrumb { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; }
.breadcrumb span { color: var(--text2); cursor: pointer; padding: 5px 10px; border-radius: 6px; white-space: nowrap; font-size: 14px; border: 1px solid transparent; }
.breadcrumb span:hover { background: var(--surface2); border-color: var(--border); }
.breadcrumb span.active { color: var(--text); background: var(--surface2); border-color: var(--border); font-weight: 500; }
.breadcrumb .sep { color: var(--text2); cursor: default; padding: 0; border: none; }
.breadcrumb .sep:hover { background: transparent; border-color: transparent; }

.toolbar { display: flex; align-items: center; gap: 10px; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
.toolbar .spacer { flex: 1; }
.search-box { padding: 9px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; width: 240px; outline: none; transition: border-color .2s; }
.search-box:focus { border-color: var(--primary); }
.lang-toggle { padding: 7px 14px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); cursor: pointer; font-weight: 500; transition: all .2s; }
.lang-toggle:hover { border-color: var(--primary); color: var(--primary); }

/* File list */
.file-list { padding: 12px 24px; }
.file-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 10px; cursor: pointer; transition: all .15s; border: 1px solid transparent; margin-bottom: 4px; }
.file-item:hover { background: var(--surface); border-color: var(--border); box-shadow: var(--shadow); }
.file-item .icon { font-size: 20px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: var(--surface2); flex-shrink: 0; }
.file-item .name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.file-item .size { color: var(--text2); font-size: 12px; min-width: 80px; text-align: right; }
.file-item .date { color: var(--text2); font-size: 12px; min-width: 120px; text-align: right; }
.file-item .actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; }
.file-item:hover .actions { opacity: 1; }
.file-item .actions button { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.file-item .actions button:hover { color: var(--text); border-color: var(--text2); box-shadow: var(--shadow); }

/* Upload area */
.upload-area { border: 2px dashed var(--border); border-radius: 14px; padding: 48px; text-align: center; margin: 20px 24px; transition: all .2s; background: var(--surface); }
.upload-area.dragover { border-color: var(--primary); background: rgba(108,92,231,.04); box-shadow: 0 0 0 4px rgba(108,92,231,.08); }
.upload-area p { color: var(--text2); margin-bottom: 14px; font-size: 15px; }
.upload-area .btn { display: inline-block; }
.upload-progress { margin-top: 16px; }
.upload-progress .bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.upload-progress .bar .fill { height: 100%; background: var(--primary); transition: width .3s; border-radius: 3px; }
.upload-progress .text { font-size: 12px; color: var(--text2); margin-top: 6px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); }
.modal h2 { font-size: 17px; margin-bottom: 18px; font-weight: 600; }
.modal .form-group { margin-bottom: 14px; }
.modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; animation: slideIn .3s; box-shadow: var(--shadow-lg); border: 1px solid rgba(0,0,0,.06); }
.toast.success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
.toast.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
.toast.info { background: #d1ecf1; color: #0c5460; border-color: #bee5eb; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.empty { text-align: center; padding: 80px 20px; color: var(--text2); }
.empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
.empty p { font-size: 14px; }

/* Responsive */
@media (max-width: 640px) {
  .file-item .date { display: none; }
  .search-box { width: 140px; }
  .file-item .actions { opacity: 1; }
  header { padding: 12px 16px; }
  .toolbar { padding: 12px 16px; }
  .file-list { padding: 8px 16px; }
  .upload-area { margin: 16px; padding: 32px 20px; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>K-Vault WebDAV</h1>
    <p data-i18n="loginDesc">Enter your credentials to access your vault</p>
    <div class="form-group">
      <label data-i18n="username">Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label data-i18n="password">Password</label>
      <input type="password" id="password" placeholder="password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" data-i18n="signIn">Sign In</button>
  </div>
</div>

<div id="app">
  <header>
    <h1>K-Vault</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN / 中文</button>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" data-i18n="logout">Logout</button>
  </header>

  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('file-input').click()" data-i18n="upload">Upload</button>
    <button class="btn btn-ghost btn-sm" onclick="showNewFolderModal()" data-i18n="newFolder">New Folder</button>
    <input type="file" id="file-input" multiple hidden onchange="handleFileSelect(event)">
    <div class="spacer"></div>
    <input type="text" class="search-box" data-i18n-placeholder="searchFiles" placeholder="Search files..." id="search-input" oninput="filterFiles()">
    <button class="btn btn-ghost btn-sm" onclick="refresh()" data-i18n="refresh">Refresh</button>
  </div>

  <div class="upload-area" id="upload-area">
    <p data-i18n="dragDrop">Drag & drop files here to upload</p>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('file-input').click()" data-i18n="browseFiles">Browse Files</button>
    <div class="upload-progress" id="upload-progress" style="display:none">
      <div class="bar"><div class="fill" id="upload-fill"></div></div>
      <div class="text" id="upload-text"></div>
    </div>
  </div>

  <div class="file-list" id="file-list"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="actions">
      <button class="btn btn-ghost btn-sm" onclick="hideModal()" data-i18n="cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="modal-confirm" onclick="modalAction()" data-i18n="confirm">Confirm</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const WEBDAV_PATH = '/webdav';
let currentPath = '';
let currentFiles = [];
let creds = null;
let modalCallback = null;
let lang = localStorage.getItem('webdav_lang') || 'zh';

const i18n = {
  zh: {
    loginDesc: '输入凭据以访问您的文件库',
    username: '用户名',
    password: '密码',
    signIn: '登录',
    logout: '退出',
    upload: '上传',
    newFolder: '新建文件夹',
    searchFiles: '搜索文件...',
    refresh: '刷新',
    dragDrop: '拖拽文件到此处上传',
    browseFiles: '浏览文件',
    cancel: '取消',
    confirm: '确认',
    root: '根目录',
    folderEmpty: '文件夹为空',
    folderEmptyDesc: '上传文件或创建文件夹开始使用',
    loading: '加载中...',
    error: '错误',
    download: '下载',
    rename: '重命名',
    delete: '删除',
    newFolderTitle: '新建文件夹',
    folderName: '文件夹名称',
    folderNamePlaceholder: 'my-folder',
    renameTitle: '重命名',
    newName: '新名称',
    deleteConfirm: '确定要删除',
    folderCreated: '文件夹已创建',
    deleted: '已删除',
    renamed: '已重命名',
    downloaded: '下载成功',
    uploadDone: '上传完成！',
    enterUserPass: '请输入用户名和密码',
    invalidCreds: '凭据无效',
    loginFailed: '登录失败',
    connectionError: '连接错误',
    enterFolderName: '请输入文件夹名称',
    folderCreateFailed: '创建文件夹失败',
    deleteFailed: '删除失败',
    renameFailed: '重命名失败',
    downloadFailed: '下载失败',
    uploadFailed: '上传失败',
  },
  en: {
    loginDesc: 'Enter your credentials to access your vault',
    username: 'Username',
    password: 'Password',
    signIn: 'Sign In',
    logout: 'Logout',
    upload: 'Upload',
    newFolder: 'New Folder',
    searchFiles: 'Search files...',
    refresh: 'Refresh',
    dragDrop: 'Drag & drop files here to upload',
    browseFiles: 'Browse Files',
    cancel: 'Cancel',
    confirm: 'Confirm',
    root: 'Root',
    folderEmpty: 'Folder is empty',
    folderEmptyDesc: 'Upload files or create a folder to get started',
    loading: 'Loading...',
    error: 'Error',
    download: 'Download',
    rename: 'Rename',
    delete: 'Delete',
    newFolderTitle: 'New Folder',
    folderName: 'Folder Name',
    folderNamePlaceholder: 'my-folder',
    renameTitle: 'Rename',
    newName: 'New Name',
    deleteConfirm: 'Are you sure you want to delete',
    folderCreated: 'Folder created',
    deleted: 'Deleted',
    renamed: 'Renamed',
    downloaded: 'Downloaded',
    uploadDone: 'Upload complete!',
    enterUserPass: 'Please enter username and password',
    invalidCreds: 'Invalid credentials',
    loginFailed: 'Login failed',
    connectionError: 'Connection error',
    enterFolderName: 'Please enter a folder name',
    folderCreateFailed: 'Failed to create folder',
    deleteFailed: 'Failed to delete',
    renameFailed: 'Failed to rename',
    downloadFailed: 'Download failed',
    uploadFailed: 'Failed to upload',
  }
};

function t(key) { return i18n[lang][key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (i18n[lang][key]) el.placeholder = i18n[lang][key];
  });
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  renderFiles();
  renderBreadcrumb();
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('webdav_lang', lang);
  applyLang();
}

function authHeader() {
  if (!creds) return {};
  return { 'Authorization': 'Basic ' + btoa(creds.user + ':' + creds.pass) };
}

async function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  if (!user || !pass) return toast(t('enterUserPass'), 'error');

  creds = { user, pass };
  localStorage.setItem('webdav_creds', JSON.stringify(creds));

  try {
    const res = await fetch(WEBDAV_PATH + '/', { method: 'PROPFIND', headers: { ...authHeader(), 'Depth': '0' } });
    if (res.status === 401) { creds = null; localStorage.removeItem('webdav_creds'); return toast(t('invalidCreds'), 'error'); }
    if (res.ok || res.status === 207) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      applyLang();
      navigate('');
      toast('Welcome! / 欢迎！', 'success');
    } else {
      toast(t('loginFailed') + ': ' + res.status, 'error');
    }
  } catch (e) {
    toast(t('connectionError') + ': ' + e.message, 'error');
  }
}

function doLogout() {
  creds = null;
  localStorage.removeItem('webdav_creds');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function navigate(path) {
  currentPath = path;
  renderBreadcrumb();
  const list = document.getElementById('file-list');
  list.innerHTML = '<div class="empty"><div class="icon">📂</div><p>' + t('loading') + '</p></div>';

  try {
    const url = path ? WEBDAV_PATH + '/' + path : WEBDAV_PATH + '/';
    const res = await fetch(url, { method: 'PROPFIND', headers: { ...authHeader(), 'Depth': '1' } });
    if (!res.ok && res.status !== 207) throw new Error('Failed: ' + res.status);

    const text = await res.text();
    const items = parsePropfind(text);
    currentFiles = items.filter(i => i.path !== (path ? '/' + path : '/'));
    renderFiles();
  } catch (e) {
    list.innerHTML = '<div class="empty"><div class="icon">❌</div><p>' + e.message + '</p></div>';
  }
}

function parsePropfind(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const responses = doc.querySelectorAll('response');
  const items = [];

  responses.forEach(resp => {
    const href = resp.querySelector('href')?.textContent || '';
    const resourcetype = resp.querySelector('resourcetype');
    const isCollection = resourcetype && resourcetype.querySelector('collection');
    const name = resp.querySelector('displayname')?.textContent || decodeURIComponent(href.split('/').filter(Boolean).pop() || '');
    const size = parseInt(resp.querySelector('getcontentlength')?.textContent || '0');
    const modified = resp.querySelector('getlastmodified')?.textContent || '';
    const contentType = resp.querySelector('getcontenttype')?.textContent || '';

    items.push({ href, name, isCollection: !!isCollection, size, modified, contentType });
  });
  return items;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = currentPath ? currentPath.split('/').filter(Boolean) : [];
  let html = '<span class="' + (parts.length === 0 ? 'active' : '') + '" onclick="navigate(\'\')">' + t('root') + '</span>';
  let pathAccum = '';
  parts.forEach((part, i) => {
    pathAccum += (pathAccum ? '/' : '') + part;
    const isLast = i === parts.length - 1;
    html += '<span class="sep">/</span>';
    html += '<span class="' + (isLast ? 'active' : '') + '" onclick="navigate(\'' + pathAccum + '\')">' + part + '</span>';
  });
  bc.innerHTML = html;
}

function renderFiles() {
  const list = document.getElementById('file-list');
  const filtered = getFilteredFiles();

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">📁</div><p>' + t('folderEmpty') + '</p><p style="margin-top:8px;font-size:13px">' + t('folderEmptyDesc') + '</p></div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    if (a.isCollection !== b.isCollection) return a.isCollection ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  list.innerHTML = sorted.map(item => {
    const icon = item.isCollection ? '📁' : getFileIcon(item.name);
    const size = item.isCollection ? '' : formatSize(item.size);
    const date = item.modified ? new Date(item.modified).toLocaleDateString() : '';
    const fullPath = currentPath ? currentPath + '/' + item.name : item.name;

    return '<div class="file-item" ondblclick="' + (item.isCollection ? 'navigate(\'' + fullPath + '\')' : 'downloadFile(\'' + fullPath + '\')') + '">' +
      '<div class="icon">' + icon + '</div>' +
      '<div class="name" title="' + item.name + '">' + item.name + '</div>' +
      '<div class="size">' + size + '</div>' +
      '<div class="date">' + date + '</div>' +
      '<div class="actions">' +
        (item.isCollection ? '' : '<button onclick="event.stopPropagation();downloadFile(\'' + fullPath + '\')">' + t('download') + '</button>') +
        '<button onclick="event.stopPropagation();renameItem(\'' + fullPath + '\',\'' + (item.isCollection ? 'folder' : 'file') + '\')">' + t('rename') + '</button>' +
        '<button onclick="event.stopPropagation();deleteItem(\'' + fullPath + '\',\'' + (item.isCollection ? 'folder' : 'file') + '\')">' + t('delete') + '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function getFilteredFiles() {
  const q = document.getElementById('search-input').value.toLowerCase();
  if (!q) return currentFiles;
  return currentFiles.filter(f => f.name.toLowerCase().includes(q));
}

function filterFiles() { renderFiles(); }

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️',
    mp4: '🎬', webm: '🎬', mov: '🎬',
    mp3: '🎵', wav: '🎵', flac: '🎵',
    pdf: '📄', doc: '📄', docx: '📄', txt: '📄',
    zip: '📦', rar: '📦', '7z': '📦',
    js: '💻', ts: '💻', py: '💻', html: '💻', css: '💻',
  };
  return icons[ext] || '📎';
}

function formatSize(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0;
  while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
  return bytes.toFixed(1) + ' ' + units[i];
}

async function downloadFile(path) {
  const url = WEBDAV_PATH + '/' + path;
  try {
    const res = await fetch(url, { headers: authHeader() });
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error('Status ' + res.status + (errText ? ': ' + errText : ''));
    }
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = path.split('/').pop();
    a.click();
    URL.revokeObjectURL(a.href);
    toast(t('downloaded'), 'success');
  } catch (e) {
    toast(t('downloadFailed') + ': ' + e.message, 'error');
  }
}

async function uploadFiles(files) {
  if (!files.length) return;
  const progress = document.getElementById('upload-progress');
  const fill = document.getElementById('upload-fill');
  const text = document.getElementById('upload-text');
  progress.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const path = currentPath ? currentPath + '/' + file.name : file.name;
    const url = WEBDAV_PATH + '/' + path;

    text.textContent = 'Uploading ' + (i + 1) + '/' + files.length + ': ' + file.name;
    fill.style.width = ((i / files.length) * 100) + '%';

    try {
      const res = await fetch(url, { method: 'PUT', headers: authHeader(), body: file });
      if (!res.ok && res.status !== 201 && res.status !== 204) {
        const errText = await res.text().catch(() => '');
        throw new Error('Status ' + res.status + (errText ? ': ' + errText : ''));
      }
    } catch (e) {
      toast(t('uploadFailed') + ' ' + file.name + ': ' + e.message, 'error');
    }
  }

  fill.style.width = '100%';
  text.textContent = t('uploadDone');
  setTimeout(() => { progress.style.display = 'none'; }, 2000);
  refresh();
}

function handleFileSelect(e) {
  uploadFiles(Array.from(e.target.files));
  e.target.value = '';
}

async function showNewFolderModal() {
  document.getElementById('modal-title').textContent = t('newFolderTitle');
  document.getElementById('modal-body').innerHTML = '<div class="form-group"><label>' + t('folderName') + '</label><input type="text" id="folder-name-input" placeholder="' + t('folderNamePlaceholder') + '"></div>';
  showModal(() => {
    const name = document.getElementById('folder-name-input').value.trim();
    if (!name) return toast(t('enterFolderName'), 'error');
    createFolder(name);
    hideModal();
  });
}

async function createFolder(name) {
  const path = currentPath ? currentPath + '/' + name : name;
  const url = WEBDAV_PATH + '/' + path;
  try {
    const res = await fetch(url, { method: 'MKCOL', headers: authHeader() });
    if (!res.ok && res.status !== 201) throw new Error('Status ' + res.status);
    toast(t('folderCreated'), 'success');
    refresh();
  } catch (e) {
    toast(t('folderCreateFailed') + ': ' + e.message, 'error');
  }
}

async function deleteItem(path, type) {
  if (!confirm(t('deleteConfirm') + ' "' + path.split('/').pop() + '"?')) return;
  const url = WEBDAV_PATH + '/' + path;
  try {
    const res = await fetch(url, { method: 'DELETE', headers: authHeader() });
    if (!res.ok && res.status !== 204) throw new Error('Status ' + res.status);
    toast(t('deleted'), 'success');
    refresh();
  } catch (e) {
    toast(t('deleteFailed') + ': ' + e.message, 'error');
  }
}

async function renameItem(path, type) {
  const oldName = path.split('/').pop();
  document.getElementById('modal-title').textContent = t('renameTitle') + ' ' + (type === 'folder' ? '📁' : '📎');
  document.getElementById('modal-body').innerHTML = '<div class="form-group"><label>' + t('newName') + '</label><input type="text" id="rename-input" value="' + oldName + '"></div>';
  showModal(() => {
    const newName = document.getElementById('rename-input').value.trim();
    if (!newName || newName === oldName) return hideModal();
    const parentPath = path.split('/').slice(0, -1).join('/');
    const newPath = parentPath ? parentPath + '/' + newName : newName;
    const url = WEBDAV_PATH + '/' + path;
    fetch(url, { method: 'MOVE', headers: { ...authHeader(), 'Destination': window.location.origin + WEBDAV_PATH + '/' + newPath } }).then(res => {
      if (!res.ok) throw new Error('Status ' + res.status);
      toast(t('renamed'), 'success');
      refresh();
    }).catch(e => toast(t('renameFailed') + ': ' + e.message, 'error'));
    hideModal();
  });
}

function refresh() { navigate(currentPath); }

function showModal(callback) {
  modalCallback = callback;
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => { const input = document.querySelector('#modal input'); if (input) input.focus(); }, 100);
}

function hideModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  modalCallback = null;
}

function modalAction() {
  if (modalCallback) modalCallback();
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Drag & drop
const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); uploadFiles(Array.from(e.dataTransfer.files)); });

// Enter key on login
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

// Enter key on modal
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('show')) modalAction(); });

// Auto login / skip if no auth
(async function() {
  const saved = localStorage.getItem('webdav_creds');
  if (saved) {
    try { creds = JSON.parse(saved); } catch {}
  }
  if (creds) {
    try {
      const res = await fetch(WEBDAV_PATH + '/', { method: 'PROPFIND', headers: { ...authHeader(), 'Depth': '0' } });
      if (res.ok || res.status === 207) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        applyLang();
        navigate('');
        return;
      }
      if (res.status === 401) {
        creds = null;
        localStorage.removeItem('webdav_creds');
        return;
      }
    } catch (e) {
      creds = null;
      localStorage.removeItem('webdav_creds');
    }
  }
  applyLang();
})();
</script>
</body>
